<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Truck emoji rendered as simple SVG truck -->
  <!-- Truck body -->
  <rect x="4" y="13" width="16" height="10" rx="1.5" fill="white"/>
  <!-- Truck cab -->
  <rect x="20" y="16" width="8" height="7" rx="1.5" fill="white"/>
  <!-- Cab window -->
  <rect x="21" y="17.5" width="5" height="3" rx="1" fill="#8b5cf6"/>
  <!-- Wheels -->
  <circle cx="9" cy="24" r="2.5" fill="#6366f1" stroke="white" stroke-width="1"/>
  <circle cx="22" cy="24" r="2.5" fill="#6366f1" stroke="white" stroke-width="1"/>
  <!-- Connector between cab and body -->
  <rect x="19" y="17" width="2" height="6" fill="white"/>
</svg>
