services:
  - type: web
    name: eld-trip-planner-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn eld_planner.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENROUTE_API_KEY
        sync: false
